name: Patch Watch (roll data forward to the newest WR patch)

# Workflow 3 — Keep the shipped data on the CURRENT Wild Rift patch.
#
# "Accurate + current" is the moat (PLAN.md §1). The daily verify loop keeps the
# values we already ship correct; this loop keeps us on the LATEST patch. It
# checks the official Wild Rift patch notes for any patch newer than the one we
# ship, and when it finds one it rolls the dataset forward — applying every
# balance/item change from the notes — on a branch and opens a PR.
#
# Like the backfill loop, it works one patch per run and re-dispatches itself
# until we're caught up, so being several patches behind self-heals over a few
# runs rather than in one giant unreviewable PR.

on:
  schedule:
    # 08:00 UTC daily — one hour after data-verify (07:00) so they don't collide.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      target_patch:
        description: "Specific patch version to roll to (e.g. 7.2b). Blank = next unshipped patch from the notes."
        required: false
        default: ""
      continue:
        description: "Re-dispatch self until caught up to the newest patch (needs WORKFLOW_PAT)"
        required: false
        default: "true"

permissions:
  contents: write # commit the rolled-forward data to a branch
  pull-requests: write # open the patch-update PR
  issues: write # file an issue if the patch notes can't be reached

concurrency:
  # Never roll two patches forward at once; a new tick waits for the running one.
  group: patch-watch
  cancel-in-progress: false

jobs:
  patch-watch:
    runs-on: ubuntu-latest
    outputs:
      behind: ${{ steps.agent.outputs.behind }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Gate: the data we ship today must already be schema-valid so any failure
      # the agent sees later is its own doing, not pre-existing rot.
      - name: Validate committed data
        run: npm run validate-data

      - name: Roll data forward to the newest patch with Claude
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --allowedTools "Read,Grep,Glob,Edit,Write,WebSearch,WebFetch,Bash(npm run validate-data),Bash(npm run typecheck),Bash(npm test),Bash(npm run build),Bash(cp:*),Bash(mkdir:*),Bash(git checkout:*),Bash(git switch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(gh issue create:*)"
          prompt: |
            You are the Wild Rift Builder patch-watch agent. Read CLAUDE.md, PLAN.md
            (§1, §3, §7), and the Zod schema at src/lib/schema/index.ts first, so every
            record you touch stays schema-valid and uses Wild Rift values only.

            GOAL: keep the app's shipped data on the CURRENT Wild Rift patch. This run
            rolls forward by ONE patch; the workflow re-runs until we're caught up.

            ── How patch data is wired (read carefully) ────────────────────────────
              - Data lives in data/patches/<major.minor>/ (e.g. `7.1`) with
                champions.json, items.json, builds.json, and meta.json. The directory
                is named by MAJOR.MINOR; meta.json.patch holds the exact hotfix
                (e.g. "7.1g").
              - data/patches/registry.json maps every exact patch version -> { date, url }.
              - src/lib/data/index.ts hardcodes:
                  * imports from `@data/patches/<major.minor>/...`
                  * `export const CURRENT_PATCH = "<exact patch>"`
                Both MUST be updated when the active dataset changes.

            ── Find the target patch ───────────────────────────────────────────────
              1. The patch we currently ship = meta.json.patch of the newest directory
                 under data/patches/ (cross-check CURRENT_PATCH in src/lib/data/index.ts).
              2. If the `target_patch` input "${{ github.event.inputs.target_patch }}" is
                 set, roll to exactly that. Otherwise, from the official Wild Rift patch
                 notes (https://wildrift.leagueoflegends.com/en-us/news/game-updates/),
                 find the OLDEST patch newer than what we ship and target that one (roll
                 forward one step at a time so each PR is reviewable).
              3. If we already ship the newest published patch, make NO changes: print
                 "Already current on <patch>", set the `behind` output to 0, and stop.

            ── Don't collide with in-flight work ───────────────────────────────────
              3a. Before doing ANY work on the target patch, run
                 `gh pr list --state open --search "<target patch>"` and scan for a
                 branch named `claude/patch-<target>` or `patch/<target>*`. If an OPEN
                 PR already rolls the data to this target patch, that work is already in
                 flight — do NOT redo it. Print "Patch <target> already has open PR #<n>,
                 skipping", set `behind` to the number of published patches still newer
                 than that target (0 if none), and stop. This is what keeps the loop from
                 clashing with a patch update someone opened by hand.

            ── Roll the dataset forward ────────────────────────────────────────────
              4. Same MAJOR.MINOR as current (e.g. 7.1g -> 7.1h): edit the existing
                 directory's JSON in place. New MAJOR.MINOR (e.g. 7.1 -> 7.2): copy the
                 current directory to data/patches/<new major.minor>/, then edit the
                 copy, and update the imports in src/lib/data/index.ts to point at it.
              5. Apply EVERY change in the patch notes: champion base/growth/ability
                 tweaks, item stat/cost/passive changes, NEW items or champions, and
                 REMOVED items/champions (e.g. patch 7.2 removes boot enchantments
                 entirely — delete those item records and any references). Cross-check
                 each value against a second source (riftgg.app/items, wildriftfire,
                 the official WR wiki) where possible. NEVER use PC League / Data Dragon
                 numbers.
              6. Update meta.json: set `patch` and `releaseDate`, refresh `sources` with
                 the exact URLs you verified against, and set `verified: true` only if
                 you fully verified the changed values against the primary source.
              7. Add the new patch to data/patches/registry.json ({ date, url }), and set
                 CURRENT_PATCH in src/lib/data/index.ts to the new exact patch. Update
                 ROSTER.md if the roster count changed.

            ── Gate + ship ─────────────────────────────────────────────────────────
              8. Run `npm run validate-data`, `npm run typecheck`, `npm test`, and
                 `npm run build`. ALL must pass — fix until green.
              9. Create branch `claude/patch-<new exact patch>` (e.g. claude/patch-7.2),
                 commit (message summarizes the roll-forward + cites sources), push, and
                 open a PR titled "Patch <new patch>: roll data forward". The PR body
                 lists every change as `entity.field: old -> new (source URL)`, plus any
                 additions/removals.
             10. Report how many published patches we are STILL behind AFTER this run to
                 the step output `behind` (e.g. `echo "behind=1" >> "$GITHUB_OUTPUT"`);
                 use 0 when caught up. Append a one-line tally to the run summary.

            If the official patch notes are unreachable from the runner (network
            policy), do NOT guess: open an issue "Patch watch: notes unreachable"
            describing what you could not fetch, set `behind` to empty, and stop.
            Be conservative — only change a value a verified source clearly states.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Loop: if we're still behind and continuation is on, queue the next roll.
      # GITHUB_TOKEN-triggered dispatches do NOT start new workflow runs, so this
      # uses WORKFLOW_PAT (a repo/Actions-scoped PAT). Without it, the loop stops
      # after one patch and you re-run manually.
      - name: Re-dispatch self until caught up
        if: >-
          github.event.inputs.continue != 'false' &&
          steps.agent.outputs.behind != '' &&
          steps.agent.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WORKFLOW_PAT not set — stopping after this patch. Re-run manually to continue."
            exit 0
          fi
          echo "Still ${{ steps.agent.outputs.behind }} patch(es) behind; queuing next roll-forward."
          gh workflow run patch-watch.yml \
            --ref "${{ github.ref_name }}" \
            -f target_patch="" \
            -f continue=true
