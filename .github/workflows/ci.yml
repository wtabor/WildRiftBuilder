name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate patch data
        run: npm run validate-data

      - name: Patch data is in sync with the pipeline
        run: |
          npm run build-data
          git diff --exit-code data/patches || {
            echo "::error::data/patches is out of sync. Run 'npm run build-data' and commit the result.";
            exit 1;
          }

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
